site_name: StateCraft
site_description: Usage documentation and API reference for StateCraft.
site_url: https://omaarr90.github.io/StateCraft/
repo_url: https://github.com/omaarr90/StateCraft
repo_name: omaarr90/StateCraft
edit_uri: edit/main/docs/
strict: true

theme:
  name: material
  features:
    - content.code.copy
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
  palette:
    - scheme: default
      primary: indigo
      accent: blue

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - toc:
      permalink: true

exclude_docs: |
  README.md
  api/core/legal/*.md
  api/engines/legal/*.md
  deliverables/
  releasing.md
  temp/

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Core Module: core.md
  - Engine Module: engines.md
  - API Reference: api.md
  - Architecture:
      - Current State: architecture/current-state.md
      - Project Overview: project-overview.md
      - Phase 2 Implementation Guide: phase-2-implementation-guide.md
      - Statevector Layout: core/statevector-layout.md
      - Statevector Measurements: core/statevector-measurements.md
      - Tensor Network Engine: core/tensor-network-engine.md
