name: CI
# Temporarily disabled until GitHub Actions supports GraalVM 25.
on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Manual trigger while waiting for GraalVM 25 support"
        required: false
jobs:
  build:
    strategy: { matrix: { os: [ubuntu-latest, macos-latest, windows-latest] } }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 25, cache: gradle }
      - uses: gradle/gradle-build-action@v3
      - run: ./gradlew build --stacktrace

  native:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm
          java-version: 25
          components: "native-image"
      - uses: gradle/gradle-build-action@v3
      - run: ./gradlew :cli:nativeCompile --stacktrace
