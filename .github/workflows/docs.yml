name: Docs

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: gradle
      - uses: gradle/gradle-build-action@v3
      - run: ./gradlew :core:javadoc :engines:javadoc --stacktrace
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: docs/requirements.txt
      - run: python -m pip install -r docs/requirements.txt
      - name: Copy generated Javadocs
        shell: bash
        run: |
          rm -rf docs/api/core docs/api/engines
          mkdir -p docs/api/core docs/api/engines
          cp -R core/build/docs/javadoc/. docs/api/core/
          cp -R engines/build/docs/javadoc/. docs/api/engines/
      - run: mkdocs build --strict --site-dir site
      - run: touch site/.nojekyll
      - if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5
      - if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
