name: Release
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Maven artifact version"
        required: true
        default: "1.0.0"
      target:
        description: "Release target"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - central
          - github
      reason:
        description: "Optional reason for a manual release"
        required: false
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

concurrency:
  group: release-${{ github.ref_name }}-${{ inputs.version || '' }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 25, cache: gradle }
      - uses: gradle/gradle-build-action@v3
      - name: Resolve release version
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" && "${GITHUB_REF_NAME:-}" == v* ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="${INPUT_VERSION}"
          fi

          if [[ -z "$version" ]]; then
            echo "Release version is required" >&2
            exit 1
          fi

          if [[ "$version" == *SNAPSHOT* ]]; then
            echo "Maven Central release versions must not be SNAPSHOT versions" >&2
            exit 1
          fi

          if [[ ! "$version" =~ ^[0-9]+(\.[0-9]+){1,2}(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Release version '$version' does not look like a Maven release version" >&2
            exit 1
          fi

          echo "ORG_GRADLE_PROJECT_VERSION_NAME=$version" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION=$version" >> "$GITHUB_ENV"
      - run: ./gradlew spotlessCheck test :core:javadoc :engines:javadoc publishToMavenLocal --stacktrace
      - run: ./gradlew -p scripts/consumer-smoke -Pstatecraft.version="$RELEASE_VERSION" test --stacktrace
      - if: ${{ github.event_name != 'workflow_dispatch' || inputs.target == 'all' || inputs.target == 'central' }}
        run: ./gradlew publishAndReleaseToMavenCentral --stacktrace
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_IN_MEMORY_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
      - if: ${{ github.event_name != 'workflow_dispatch' || inputs.target == 'all' || inputs.target == 'github' }}
        run: ./gradlew :core:publishMavenPublicationToGitHubPackagesRepository :engines:publishMavenPublicationToGitHubPackagesRepository --stacktrace
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - if: ${{ github.event_name != 'workflow_dispatch' || inputs.target == 'all' || inputs.target == 'github' }}
        run: ./gradlew -p scripts/consumer-smoke -Pstatecraft.version="$RELEASE_VERSION" test -Pstatecraft.githubPackages=true --refresh-dependencies --stacktrace
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
