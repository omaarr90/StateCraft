name: Release
on:
  workflow_dispatch:
    inputs:
      target:
        description: "Release target"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - central
          - github
      reason:
        description: "Optional reason for a manual release"
        required: false
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 25, cache: gradle }
      - uses: gradle/gradle-build-action@v3
      - run: ./gradlew spotlessCheck test :core:javadoc :engines:javadoc publishToMavenLocal --stacktrace
      - run: ./gradlew -p scripts/consumer-smoke test --stacktrace
      - if: ${{ github.event_name != 'workflow_dispatch' || inputs.target == 'all' || inputs.target == 'central' }}
        run: ./gradlew publishAndReleaseToMavenCentral --stacktrace
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_IN_MEMORY_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
      - if: ${{ github.event_name != 'workflow_dispatch' || inputs.target == 'all' || inputs.target == 'github' }}
        run: ./gradlew :core:publishMavenPublicationToGitHubPackagesRepository :engines:publishMavenPublicationToGitHubPackagesRepository --stacktrace
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - if: ${{ github.event_name != 'workflow_dispatch' || inputs.target == 'all' || inputs.target == 'github' }}
        run: ./gradlew -p scripts/consumer-smoke test -Pstatecraft.githubPackages=true --refresh-dependencies --stacktrace
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
